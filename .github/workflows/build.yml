name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build macOS App
    runs-on: macos-15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
      
      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build, sign, and notarize DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          ASC_CERTIFICATE: ${{ secrets.ASC_CERTIFICATE }}
          ASC_CERTIFICATE_PASSWORD: ${{ secrets.ASC_CERTIFICATE_PASSWORD }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          DEVELOPER_ID_IDENTITY: Developer ID Application: Samantha Myers (7GF6N5U8ZH)
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          umask 077

          DEFAULT_KEYCHAIN=$(security default-keychain -d user | tr -d '"')
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id.p12"
          ASC_KEY_FILE="$RUNNER_TEMP/AuthKey.p8"

          cleanup() {
            security default-keychain -d user -s "$DEFAULT_KEYCHAIN" >/dev/null 2>&1 || true
            security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
            rm -f "$CERTIFICATE_PATH" "$ASC_KEY_FILE"
          }
          trap cleanup EXIT

          for required_var in ASC_CERTIFICATE ASC_CERTIFICATE_PASSWORD ASC_PRIVATE_KEY ASC_KEY_ID ASC_ISSUER_ID; do
            if [ -z "${!required_var}" ]; then
              echo "::error::Missing ${required_var} secret"
              exit 1
            fi
          done

          printf '%s' "$ASC_CERTIFICATE" | base64 -D > "$CERTIFICATE_PATH"

          security create-keychain -p "$ASC_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$ASC_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$ASC_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$CERTIFICATE_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$ASC_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$DEFAULT_KEYCHAIN"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$DEVELOPER_ID_IDENTITY" >/dev/null

          printf '%s' "$ASC_PRIVATE_KEY" > "$ASC_KEY_FILE"
          chmod 600 "$ASC_KEY_FILE"
          export ASC_KEY_FILE

          chmod +x ./scripts/build-dmg.sh
          ./scripts/build-dmg.sh --release
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: LGTVMenuBar-${{ steps.version.outputs.version }}
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 30
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: LGTVMenuBar ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release/*.dmg

      - name: Cleanup signing materials
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          rm -f "$RUNNER_TEMP/developer_id.p12" "$RUNNER_TEMP/AuthKey.p8"
